version = 0.1

[default.deploy.parameters]
stack_name = "sam-app"
resolve_s3 = true
s3_prefix = "sam-app"
region = "eu-central-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
disable_rollback = true
parameter_overrides = "LogLevel=\"INFO\" BedrockModelId=\"amazon.nova-lite-v1:0\" BedrockRegion=\"us-east-1\" GoogleRedirectUri=\"\" SsmTokenPath=\"/calendar-agent/oauth\" FrontendUrl=\"calendar\""
image_repositories = []

[default.global.parameters]
region = "eu-central-1"
